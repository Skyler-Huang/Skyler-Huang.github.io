<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片墙 - Skyler Huang</title>
    <style>
        :root {
            --paper: #faf7f2;
            --card-bg: #ffffff;
            --ink: #2c2416;
            --ink-secondary: #5c5347;
            --ink-muted: #8a8175;
            --pine: #2d4a37;
            --pine-light: #3a5c47;
            --pine-pale: rgba(45, 74, 55, 0.06);
            --pine-glow: rgba(45, 74, 55, 0.14);
            --bronze: #a0783c;
            --bronze-light: #c49a4c;
            --bronze-dark: #8a5f2f;
            --bronze-pale: rgba(160, 120, 60, 0.08);
            --bronze-glow: rgba(160, 120, 60, 0.20);
            --border-subtle: #e8e2d8;
            --border-card: #ede7dd;
            --shadow-sm: 0 1px 3px rgba(44, 36, 22, 0.04);
            --shadow-md: 0 3px 12px rgba(44, 36, 22, 0.07);
            --shadow-lg: 0 6px 24px rgba(44, 36, 22, 0.10);
            --shadow-xl: 0 10px 36px rgba(44, 36, 22, 0.14);
            --radius-sm: 5px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --transition: 0.30s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.20s cubic-bezier(0.4, 0, 0.2, 1);
            --font-serif: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'Songti SC', 'SimSun', 'KaiTi', '楷体', 'Georgia', 'Times New Roman', serif;
            --font-sans: 'Inter', 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans SC', 'Microsoft YaHei', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: var(--font-sans);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 18% 10%, rgba(196, 154, 76, 0.025) 0%, transparent 55%),
                radial-gradient(ellipse at 82% 85%, rgba(45, 74, 55, 0.02) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 45%, rgba(160, 120, 60, 0.015) 0%, transparent 70%);
        }

        /* 顶部装饰线 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg,
                    var(--pine) 0%,
                    var(--bronze-light) 25%,
                    var(--pine-light) 50%,
                    var(--bronze) 75%,
                    var(--pine) 100%);
            z-index: 100;
            box-shadow: 0 1px 6px rgba(45, 74, 55, 0.12);
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 960px;
            padding: 36px 22px 24px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 100vh;
        }

        /* ========== 返回首页 ========== */
        .back-link-wrapper {
            margin-bottom: 8px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
            color: var(--pine);
            font-size: 0.88rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            padding: 7px 14px 7px 9px;
            border-radius: 20px;
            transition: var(--transition);
            background: transparent;
            white-space: nowrap;
        }

        .back-link:hover {
            background-color: var(--pine-pale);
            color: #1f3627;
            transform: translateX(-2px);
        }
        .back-link:active {
            transform: scale(0.95);
            background-color: rgba(45, 74, 55, 0.12);
        }
        .back-link svg {
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .back-link:hover svg {
            transform: translateX(-3px);
        }

        /* ========== 页面头部 ========== */
        .page-header {
            text-align: left;
            margin-bottom: 28px;
            padding-top: 2px;
            position: relative;
        }

        .header-label {
            display: inline-block;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            color: var(--bronze);
            font-weight: 600;
            margin-bottom: 6px;
            padding: 3px 12px;
            background: var(--bronze-pale);
            border-radius: 20px;
            border: 1px solid rgba(160, 120, 60, 0.15);
        }

        .page-title {
            font-family: var(--font-serif);
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--pine);
            margin: 8px 0 2px;
            line-height: 1.25;
        }

        .page-desc {
            font-size: 0.9rem;
            color: var(--ink-muted);
            font-weight: 400;
            letter-spacing: 0.03em;
            margin-top: 4px;
        }

        .header-ornament {
            display: block;
            width: 44px;
            height: 2px;
            background: linear-gradient(90deg, var(--bronze-light), var(--bronze), transparent);
            border-radius: 1px;
            margin-top: 13px;
            opacity: 0.7;
        }

        /* ========== 照片网格 ========== */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* ========== 单张照片卡片 ========== */
        .photo-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1.5px solid var(--border-card);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
        }

        .photo-card:hover {
            border-color: rgba(160, 120, 60, 0.28);
            box-shadow: var(--shadow-xl);
            transform: translateY(-3px);
        }
        .photo-card:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-sm);
            transition: 0.10s ease;
        }

        /* ========== 照片框架（占位图片区域） ========== */
        .photo-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 2;
            overflow: hidden;
            background-color: #e8e3d8;
            flex-shrink: 0;
        }

        /* 模拟照片纹理覆盖层 */
        .photo-frame::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            background:
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 1px,
                    rgba(255, 255, 255, 0.018) 1px,
                    rgba(255, 255, 255, 0.018) 2px),
                radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.03) 0%, transparent 70%);
            border-radius: 0;
            opacity: 0.7;
        }

        /* 左侧书脊光 */
        .photo-frame::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(90deg,
                    rgba(0, 0, 0, 0.12) 0%,
                    rgba(0, 0, 0, 0.03) 35%,
                    transparent 100%);
            z-index: 4;
            pointer-events: none;
            border-radius: 0;
        }

        /* 占位图内容容器 */
        .placeholder-content {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }

        .placeholder-icon {
            width: 48px;
            height: 48px;
            opacity: 0.55;
            transition: var(--transition-fast);
        }
        .photo-card:hover .placeholder-icon {
            opacity: 0.75;
            transform: scale(1.08);
        }

        .placeholder-tag {
            font-size: 0.65rem;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0.5;
            font-family: var(--font-sans);
            transition: var(--transition-fast);
        }
        .photo-card:hover .placeholder-tag {
            opacity: 0.7;
        }

        /* ---- 各照片独特的背景 ---- */

        /* 照片1：城市天际线 - 冷灰蓝 */
        .frame-city {
            background:
                linear-gradient(175deg, #d5d9de 0%, #c2c8ce 30%, #b0b5bb 70%, #9da3a8 100%);
            color: #4a5058;
        }
        .frame-city .placeholder-tag {
            color: #4a5058;
        }

        /* 照片2：海边日落 - 暖橙 */
        .frame-seaside {
            background:
                linear-gradient(175deg, #f0dcc8 0%, #e8ccae 25%, #dbb896 55%, #c9a078 100%);
            color: #6b4d30;
        }
        .frame-seaside .placeholder-tag {
            color: #6b4d30;
        }

        /* 照片3：山林湖泊 - 柔和绿 */
        .frame-mountain {
            background:
                linear-gradient(175deg, #c8d4c4 0%, #b4c4b0 30%, #a0b49c 65%, #8ca088 100%);
            color: #3a4d36;
        }
        .frame-mountain .placeholder-tag {
            color: #3a4d36;
        }

        /* 照片4：古镇街巷 - 暖陶土 */
        .frame-town {
            background:
                linear-gradient(175deg, #e0d0bc 0%, #d4c0a8 30%, #c8b094 60%, #b8a080 100%);
            color: #5c3d28;
        }
        .frame-town .placeholder-tag {
            color: #5c3d28;
        }

        /* 照片5：咖啡馆 - 奶油金 */
        .frame-cafe {
            background:
                linear-gradient(175deg, #e8dcc8 0%, #dccfac 30%, #d0c2a0 60%, #c4b594 100%);
            color: #5a4530;
        }
        .frame-cafe .placeholder-tag {
            color: #5a4530;
        }

        /* ========== 照片信息区域 ========== */
        .photo-info {
            padding: 13px 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            position: relative;
            background-color: #fffefc;
        }

        /* 信息区域顶部的金色细线 */
        .photo-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 16px;
            right: 16px;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    var(--bronze-light) 20%,
                    var(--bronze) 50%,
                    var(--bronze-light) 80%,
                    transparent 100%);
            opacity: 0.45;
            border-radius: 0.5px;
        }

        .photo-date {
            font-size: 0.73rem;
            color: var(--ink-muted);
            letter-spacing: 0.04em;
            font-weight: 450;
            line-height: 1.4;
        }

        .photo-location {
            font-size: 0.85rem;
            color: var(--ink-secondary);
            letter-spacing: 0.03em;
            font-weight: 550;
            line-height: 1.4;
        }

        .photo-location::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--bronze-light);
            margin-right: 7px;
            vertical-align: middle;
            opacity: 0.6;
            flex-shrink: 0;
        }

        /* ========== 底部版权 ========== */
        .page-footer {
            text-align: center;
            margin-top: 40px;
            padding: 18px 0 8px;
            color: var(--ink-muted);
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            position: relative;
        }

        .page-footer::before {
            content: '';
            display: block;
            width: 56px;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--bronze-light), var(--bronze), transparent);
            margin: 0 auto 16px;
            border-radius: 1px;
            opacity: 0.55;
        }

        .page-footer .footer-dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            background-color: #d4c8b0;
            border-radius: 50%;
            margin: 0 8px;
            vertical-align: middle;
        }

        .page-footer a {
            color: var(--pine);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .page-footer a:hover {
            color: #1f3627;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-thickness: 1px;
        }

        /* ========== 响应式设计 ========== */
        @media (max-width: 768px) {
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 14px;
            }
        }

        @media (max-width: 600px) {
            .main-container {
                padding: 22px 12px 16px;
                max-width: 100%;
            }

            .page-header {
                margin-bottom: 20px;
            }
            .page-title {
                font-size: 1.5rem;
            }
            .page-desc {
                font-size: 0.8rem;
            }
            .header-label {
                font-size: 0.66rem;
                padding: 2px 10px;
            }

            .photo-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .photo-card {
                border-radius: var(--radius-md);
            }

            .photo-frame {
                aspect-ratio: 4 / 3;
            }

            .placeholder-icon {
                width: 38px;
                height: 38px;
            }
            .placeholder-tag {
                font-size: 0.6rem;
                letter-spacing: 0.08em;
            }

            .photo-info {
                padding: 11px 13px 12px;
            }
            .photo-info::before {
                left: 13px;
                right: 13px;
            }
            .photo-date {
                font-size: 0.68rem;
            }
            .photo-location {
                font-size: 0.78rem;
            }
            .photo-location::before {
                width: 5px;
                height: 5px;
                margin-right: 5px;
            }

            .back-link {
                font-size: 0.8rem;
                padding: 6px 11px 6px 7px;
            }
            .page-footer {
                margin-top: 26px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 380px) {
            .main-container {
                padding: 16px 8px 10px;
            }
            .photo-grid {
                gap: 10px;
            }
            .photo-frame {
                aspect-ratio: 1 / 1;
            }
            .placeholder-icon {
                width: 32px;
                height: 32px;
            }
            .placeholder-tag {
                font-size: 0.55rem;
            }
            .photo-info {
                padding: 9px 10px 10px;
            }
            .photo-info::before {
                left: 10px;
                right: 10px;
            }
            .photo-date {
                font-size: 0.64rem;
            }
            .photo-location {
                font-size: 0.73rem;
            }
            .page-title {
                font-size: 1.3rem;
            }
            .page-desc {
                font-size: 0.72rem;
            }
            .page-footer {
                margin-top: 20px;
                font-size: 0.66rem;
            }
        }

        @media (min-width: 1024px) {
            .photo-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 22px;
            }
            .photo-frame {
                aspect-ratio: 3 / 2;
            }
            .placeholder-icon {
                width: 52px;
                height: 52px;
            }
        }

        /* 减弱动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>

    <main class="main-container">

        <!-- 返回首页 -->
        <div class="back-link-wrapper">
            <a href="/" class="back-link" aria-label="返回首页">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                返回首页
            </a>
        </div>

        <!-- 页面头部 -->
        <header class="page-header">
            <span class="header-label">Photography</span>
            <h1 class="page-title">照片墙</h1>
            <p class="page-desc">📸 随手拍 · 持续扩建中</p>
            <span class="header-ornament"></span>
        </header>

        <!-- 照片网格 -->
        <ul class="photo-grid">

            <!-- 照片1：城市天际线 -->
            <li>
                <article class="photo-card">
                    <div class="photo-frame frame-city" aria-label="城市天际线占位图">
                        <div class="placeholder-content">
                            <!-- 建筑群 SVG 图标 -->
                            <svg class="placeholder-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="5" y="26" width="7" height="18" stroke="currentColor" stroke-width="1.6" fill="none" rx="1" />
                                <rect x="14" y="18" width="8" height="26" stroke="currentColor" stroke-width="1.6" fill="none" rx="1" />
                                <rect x="25" y="22" width="6" height="22" stroke="currentColor" stroke-width="1.6" fill="none" rx="1" />
                                <rect x="34" y="13" width="9" height="31" stroke="currentColor" stroke-width="1.6" fill="none" rx="1" />
                                <circle cx="16" cy="10" r="2.5" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.5" />
                                <line x1="16" y1="7" x2="16" y2="4" stroke="currentColor" stroke-width="1" opacity="0.4" stroke-linecap="round" />
                            </svg>
                            <span class="placeholder-tag">Cityscape</span>
                        </div>
                    </div>
                    <div class="photo-info">
                        <span class="photo-date">2024年12月15日</span>
                        <span class="photo-location">上海 · 外滩</span>
                    </div>
                </article>
            </li>

            <!-- 照片2：海边日落 -->
            <li>
                <article class="photo-card">
                    <div class="photo-frame frame-seaside" aria-label="海边日落占位图">
                        <div class="placeholder-content">
                            <!-- 太阳与海浪 SVG 图标 -->
                            <svg class="placeholder-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="24" cy="16" r="8" stroke="currentColor" stroke-width="1.6" fill="none" />
                                <circle cx="24" cy="16" r="3" fill="currentColor" opacity="0.6" />
                                <path d="M6 36 Q12 30 18 36 Q24 42 30 36 Q36 30 42 36"
                                stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" />
                                <path d="M10 40 Q16 35 22 40 Q28 45 34 40 Q40 35 44 40"
                                stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5" />
                            </svg>
                            <span class="placeholder-tag">Seaside</span>
                        </div>
                    </div>
                    <div class="photo-info">
                        <span class="photo-date">2024年11月20日</span>
                        <span class="photo-location">厦门 · 环岛路</span>
                    </div>
                </article>
            </li>

            <!-- 照片3：山林湖泊 -->
            <li>
                <article class="photo-card">
                    <div class="photo-frame frame-mountain" aria-label="山林湖泊占位图">
                        <div class="placeholder-content">
                            <!-- 山峰 SVG 图标 -->
                            <svg class="placeholder-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <polygon points="4,34 18,14 24,20 32,8 44,34"
                                stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round" />
                                <polygon points="8,36 18,20 24,26 32,16 42,36"
                                stroke="currentColor" stroke-width="1" fill="none" stroke-linejoin="round" opacity="0.4" />
                                <line x1="4" y1="34" x2="44" y2="34" stroke="currentColor" stroke-width="1.4" opacity="0.6" stroke-linecap="round" />
                            </svg>
                            <span class="placeholder-tag">Mountain</span>
                        </div>
                    </div>
                    <div class="photo-info">
                        <span class="photo-date">2024年10月8日</span>
                        <span class="photo-location">杭州 · 西湖</span>
                    </div>
                </article>
            </li>

            <!-- 照片4：古镇街巷 -->
            <li>
                <article class="photo-card">
                    <div class="photo-frame frame-town" aria-label="古镇街巷占位图">
                        <div class="placeholder-content">
                            <!-- 传统屋顶 SVG 图标 -->
                            <svg class="placeholder-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <polygon points="24,6 4,26 10,26 12,40 36,40 38,26 44,26"
                                stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round" />
                                <rect x="16" y="28" width="7" height="12" stroke="currentColor" stroke-width="1.2" fill="none" rx="0.5" opacity="0.5" />
                                <rect x="26" y="30" width="6" height="10" stroke="currentColor" stroke-width="1.2" fill="none" rx="0.5" opacity="0.5" />
                            </svg>
                            <span class="placeholder-tag">Old Town</span>
                        </div>
                    </div>
                    <div class="photo-info">
                        <span class="photo-date">2024年9月12日</span>
                        <span class="photo-location">苏州 · 平江路</span>
                    </div>
                </article>
            </li>

            <!-- 照片5：咖啡馆 -->
            <li>
                <article class="photo-card">
                    <div class="photo-frame frame-cafe" aria-label="咖啡馆占位图">
                        <div class="placeholder-content">
                            <!-- 咖啡杯 SVG 图标 -->
                            <svg class="placeholder-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="10" y="14" width="22" height="20" rx="3"
                                stroke="currentColor" stroke-width="1.6" fill="none" />
                                <path d="M32 18 L38 18 Q42 18 42 22 Q42 26 38 26 L32 26"
