<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社交链接 - Skyler Huang</title>
    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #f5f6f7;
            --card-hover-bg: #eef0f2;
            --pine: #3a6047;
            --pine-dark: #2d4a37;
            --pine-light: rgba(58, 96, 71, 0.08);
            --pine-glow: rgba(58, 96, 71, 0.18);
            --text-primary: #2c2c2c;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border-subtle: #e8eaed;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 8px 28px rgba(0, 0, 0, 0.10);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans SC', 'Microsoft YaHei', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* 顶部墨绿色装饰线 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg,
                    var(--pine-dark) 0%,
                    var(--pine) 30%,
                    #4e8a64 60%,
                    var(--pine) 100%);
            z-index: 100;
            box-shadow: 0 1px 8px rgba(58, 96, 71, 0.15);
        }

        /* 背景微妙的纹理 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(58, 96, 71, 0.015) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(58, 96, 71, 0.012) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(58, 96, 71, 0.008) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            padding: 32px 20px 20px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            flex: 1;
        }

        /* ========== 返回首页链接 ========== */
        .back-link-wrapper {
            margin-bottom: 10px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
            color: var(--pine);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            padding: 8px 14px 8px 10px;
            border-radius: 22px;
            transition: var(--transition);
            background: transparent;
            position: relative;
            white-space: nowrap;
        }

        .back-link:hover {
            background-color: var(--pine-light);
            color: var(--pine-dark);
            transform: translateX(-2px);
        }

        .back-link:active {
            transform: scale(0.96);
            background-color: rgba(58, 96, 71, 0.14);
        }

        .back-link svg {
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .back-link:hover svg {
            transform: translateX(-3px);
        }

        /* ========== 头部区域 ========== */
        .header {
            text-align: center;
            margin-bottom: 28px;
            padding-top: 4px;
        }

        .header-icon {
            display: inline-block;
            margin-bottom: 8px;
            opacity: 0.85;
        }

        .header-title {
            font-size: 1.7rem;
            font-weight: 650;
            letter-spacing: 0.03em;
            color: var(--text-primary);
            margin: 0;
            line-height: 1.2;
        }

        .header-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .header-accent {
            display: block;
            width: 36px;
            height: 3px;
            background-color: var(--pine);
            border-radius: 2px;
            margin: 14px auto 0;
            opacity: 0.7;
        }

        /* ========== 社交卡片列表 ========== */
        .social-list {
            display: flex;
            flex-direction: column;
            gap: 13px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .social-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            text-decoration: none;
            color: var(--text-primary);
            transition: var(--transition);
            border: 1.5px solid transparent;
            box-shadow: var(--shadow-sm);
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            outline: none;
        }

        .social-card:hover {
            background-color: var(--card-hover-bg);
            border-color: rgba(58, 96, 71, 0.25);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .social-card:active {
            transform: scale(0.985);
            background-color: #e9ecf0;
            border-color: rgba(58, 96, 71, 0.35);
            box-shadow: var(--shadow-sm);
            transition: 0.1s ease;
        }

        .social-card:focus-visible {
            outline: 2.5px solid var(--pine);
            outline-offset: 3px;
            border-radius: var(--radius-md);
        }

        /* 卡片图标容器 */
        .card-icon {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            transition: var(--transition);
            position: relative;
        }

        .social-card:hover .card-icon {
            box-shadow: 0 2px 10px rgba(58, 96, 71, 0.16);
            transform: scale(1.04);
        }

        .card-icon svg {
            width: 22px;
            height: 22px;
            transition: transform 0.3s ease;
        }

        .social-card:hover .card-icon svg {
            transform: scale(1.08);
        }

        /* 卡片文字 */
        .card-text {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .platform-name {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .platform-handle {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.01em;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 卡片箭头 */
        .card-arrow {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            opacity: 0.4;
            transition: var(--transition);
        }

        .social-card:hover .card-arrow {
            opacity: 0.75;
            transform: translateX(3px);
        }

        .card-arrow svg {
            width: 18px;
            height: 18px;
        }

        /* ========== 底部版权 ========== */
        .footer {
            text-align: center;
            margin-top: 36px;
            padding: 16px 0 8px;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 0.03em;
            position: relative;
        }

        .footer::before {
            content: '';
            display: block;
            width: 50px;
            height: 1px;
            background-color: #e0e3e7;
            margin: 0 auto 16px;
            border-radius: 1px;
        }

        .footer a {
            color: var(--pine);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: var(--pine-dark);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-thickness: 1px;
        }

        .footer-dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            background-color: #d0d4d8;
            border-radius: 50%;
            margin: 0 8px;
            vertical-align: middle;
        }

        /* ========== 响应式设计 ========== */
        @media (max-width: 540px) {
            .main-container {
                padding: 20px 14px 14px;
                max-width: 100%;
            }

            .header {
                margin-bottom: 20px;
            }

            .header-title {
                font-size: 1.45rem;
            }

            .header-subtitle {
                font-size: 0.82rem;
            }

            .social-list {
                gap: 10px;
            }

            .social-card {
                padding: 14px 15px;
                gap: 12px;
                border-radius: var(--radius-sm);
            }

            .card-icon {
                width: 40px;
                height: 40px;
            }

            .card-icon svg {
                width: 20px;
                height: 20px;
            }

            .platform-name {
                font-size: 0.93rem;
            }

            .platform-handle {
                font-size: 0.74rem;
            }

            .card-arrow svg {
                width: 16px;
                height: 16px;
            }

            .back-link {
                font-size: 0.82rem;
                padding: 7px 12px 7px 8px;
            }

            .footer {
                margin-top: 24px;
                font-size: 0.74rem;
            }
        }

        @media (max-width: 380px) {
            .main-container {
                padding: 16px 10px 10px;
            }

            .social-card {
                padding: 12px 13px;
                gap: 10px;
                border-radius: var(--radius-sm);
            }

            .card-icon {
                width: 36px;
                height: 36px;
            }

            .card-icon svg {
                width: 18px;
                height: 18px;
            }

            .platform-name {
                font-size: 0.88rem;
            }

            .platform-handle {
                font-size: 0.7rem;
            }

            .header-title {
                font-size: 1.3rem;
            }
        }

        /* 针对大屏设备的微调 */
        @media (min-width: 768px) {
            .main-container {
                padding-top: 44px;
            }

            .social-card {
                padding: 17px 20px;
            }

            .header-title {
                font-size: 1.85rem;
            }
        }

        /*  prefers-reduced-motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* 暗色模式提示 - 保持亮色为主，但做轻微适配 */
        @media (prefers-color-scheme: dark) {
            /* 本页面设计为亮色北欧风，暗色模式下保持亮色主题 */
            /* 如需要可在此添加暗色模式覆盖 */
        }
    </style>
</head>
