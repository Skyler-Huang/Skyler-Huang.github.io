<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄乐天 · Skyler | 会计学专业 · 用技术为专业能力提效</title>
    <meta name="description" content="黄乐天（Skyler）的个人数字据点——会计学专业，探索技术如何为专业能力提效。hletian.cn">
    <style>
        :root {
            --bg: #faf7f2;
            --card-bg: #ffffff;
            --primary: #3d5a4b;
            --accent: #b49b7f;
            --text: #4a5a6a;
            --text-dark: #2c3a2f;
            --text-light: #6b7d8e;
            --gray-placeholder: #f0ede8;
            --hover-bg: #f5f0eb;
            --shadow-sm: 0 1px 3px rgba(60, 50, 40, 0.06);
            --shadow-md: 0 4px 16px rgba(60, 50, 40, 0.10);
            --shadow-lg: 0 8px 30px rgba(60, 50, 40, 0.14);
            --radius: 8px;
            --radius-sm: 4px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
            --transition-slow: 0.5s ease;
            --font-serif: Georgia, 'Times New Roman', 'Noto Serif SC', 'Source Han Serif SC', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --max-width: 1080px;
            --nav-height: 56px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            padding-top: var(--nav-height);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes navFadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            padding: 48px 24px 20px;
            position: relative;
        }

        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            position: relative;
        }

        .avatar-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: var(--primary);
            color: #ffffff;
            font-family: var(--font-serif);
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 0.02em;
            position: relative;
            margin-bottom: 18px;
            animation: fadeInUp 0.7s ease-out both;
            animation-delay: 0.05s;
            user-select: none;
            flex-shrink: 0;
        }

        .avatar-badge::after {
            content: '';
            position: absolute;
            bottom: 6px;
            right: 8px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--accent);
            opacity: 0.85;
        }

        .header-name {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 0.04em;
            margin-bottom: 2px;
            animation: fadeInUp 0.7s ease-out both;
            animation-delay: 0.20s;
        }

        .header-english-name {
            font-family: var(--font-serif);
            font-size: 1rem;
            color: var(--accent);
            font-weight: 400;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
            animation: fadeInUp 0.7s ease-out both;
            animation-delay: 0.35s;
        }

        .header-quote {
            font-size: 0.85rem;
            color: #b0a89e;
            font-style: italic;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
            animation: fadeInUp 0.7s ease-out both;
            animation-delay: 0.42s;
        }

        .header-tagline {
            font-size: 0.95rem;
            color: var(--text-light);
            font-weight: 400;
            letter-spacing: 0.03em;
            animation: fadeInUp 0.7s ease-out both;
            animation-delay: 0.50s;
        }

        .header-github {
            position: absolute;
            top: 8px;
            right: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: var(--text-light);
            transition: color var(--transition-normal), background-color var(--transition-normal);
            text-decoration: none;
            animation: fadeInUp 0.7s ease-out both;
            animation-delay: 0.55s;
        }

        .header-github:hover {
            color: var(--primary);
            background-color: var(--hover-bg);
        }

        .header-github svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .header-divider {
            max-width: var(--max-width);
            margin: 18px auto 0;
            height: 1px;
            background-color: var(--accent);
            opacity: 0.35;
            border: none;
        }

        /* ========== 天气模块 ========== */
        .weather-widget {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px 9px;
            margin-top: 14px;
            padding: 7px 18px;
            background-color: var(--card-bg);
            border: 1px solid rgba(180, 155, 127, 0.30);
            border-radius: 999px;
            box-shadow: var(--shadow-sm);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            color: var(--text);
            letter-spacing: 0.02em;
            max-width: 92%;
            animation: fadeInUp 0.7s ease-out both;
            animation-delay: 0.60s;
        }

        .weather-widget .w-icon {
            font-size: 1.3rem;
            line-height: 1;
        }

        .weather-widget .w-city {
            color: var(--primary);
            font-weight: 600;
        }

        .weather-widget .w-cond {
            color: var(--text);
        }

        .weather-widget .w-temp {
            color: var(--accent);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .weather-widget .w-sep {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: var(--accent);
            opacity: 0.55;
            flex-shrink: 0;
        }

        /* 加载中 / 失败等静默状态：不报错、不红屏 */
        .weather-widget.is-muted {
            color: var(--text-light);
            font-style: italic;
        }

        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--nav-height);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            transition: background-color var(--transition-normal), box-shadow var(--transition-normal);
            animation: navFadeIn 0.5s ease-out both;
            animation-delay: 0.65s;
        }

        .nav-bar.scrolled {
            background-color: rgba(250, 247, 242, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 1px 0 rgba(180, 155, 127, 0.18);
        }

        .nav-inner {
            max-width: var(--max-width);
            width: 100%;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            position: relative;
        }

        .nav-item {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 10px 16px;
            font-size: 0.93rem;
            font-weight: 500;
            color: var(--text-dark);
            cursor: pointer;
            border-radius: var(--radius-sm);
            text-decoration: none;
            white-space: nowrap;
            letter-spacing: 0.03em;
            transition: color var(--transition-fast), background-color var(--transition-fast);
            user-select: none;
        }

        .nav-item:hover {
            color: var(--primary);
            background-color: var(--hover-bg);
        }

        .nav-item.active {
            color: var(--primary);
            font-weight: 600;
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            width: 0;
            height: 2px;
            background-color: var(--accent);
            border-radius: 1px;
            transition: width var(--transition-fast), left var(--transition-fast);
        }

        .nav-item:hover::after {
            width: calc(100% - 32px);
            left: 16px;
        }

        .nav-item.active::after {
            width: calc(100% - 32px);
            left: 16px;
            background-color: var(--primary);
        }

        .nav-arrow {
            display: inline-block;
            font-size: 0.65rem;
            transition: transform var(--transition-normal);
            line-height: 1;
        }

        .nav-item.dropdown-open .nav-arrow {
            transform: rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            background-color: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            min-width: 180px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.25s ease, opacity 0.25s ease, transform 0.25s ease;
            z-index: 1001;
            pointer-events: none;
            list-style: none;
            padding: 0;
        }

        .dropdown-menu.open {
            max-height: 400px;
            opacity: 1;
            transform: translateX(-50%) translateY(6px);
            pointer-events: auto;
        }

        .dropdown-menu a {
            display: block;
            padding: 10px 18px;
            font-size: 0.88rem;
            color: var(--text-dark);
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: background-color var(--transition-fast), color var(--transition-fast);
            white-space: nowrap;
            border-bottom: 1px solid rgba(180, 155, 127, 0.10);
        }

        .dropdown-menu a:last-child {
            border-bottom: none;
        }

        .dropdown-menu a:hover {
            background-color: var(--hover-bg);
            color: var(--primary);
        }

        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 5px;
            z-index: 1002;
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .hamburger-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: var(--text-dark);
            border-radius: 1px;
            transition: transform var(--transition-normal), opacity var(--transition-normal);
        }

        .hamburger-btn.open span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }
        .hamburger-btn.open span:nth-child(2) {
            opacity: 0;
        }
        .hamburger-btn.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        .progress-bar {
            position: fixed;
            top: var(--nav-height);
            left: 0;
            width: 100%;
            height: 3px;
            z-index: 999;
            background-color: rgba(180, 155, 127, 0.25);
            pointer-events: none;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.1s linear;
        }

        .back-to-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 999;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            cursor: pointer;
            font-size: 1.25rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-normal), transform var(--transition-normal), box-shadow var(--transition-normal);
            box-shadow: var(--shadow-md);
        }

        .back-to-top:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .back-to-top.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .main-container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px 40px;
        }

        .section-block {
            margin-top: 44px;
            scroll-margin-top: calc(var(--nav-height) + 16px);
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }

        .section-block.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-heading {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-serif);
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.05em;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(180, 155, 127, 0.25);
        }

        .section-heading::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent);
            flex-shrink: 0;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            padding: 22px 20px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 3px solid var(--primary);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
            position: relative;
            opacity: 0;
            transform: translateY(16px);
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out, box-shadow var(--transition-normal);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .card:active {
            transform: scale(0.97);
            transition: transform 0.1s ease;
        }

        .card-title {
            font-family: var(--font-serif);
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }

        .card-desc {
            font-size: 0.88rem;
            color: var(--text-light);
            line-height: 1.6;
            letter-spacing: 0.02em;
        }

        .card-contact-link {
            display: block;
            font-size: 0.82rem;
            color: var(--accent);
            text-decoration: none;
            line-height: 1.8;
            transition: color var(--transition-fast);
        }

        .card-contact-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .placeholder-block {
            background-color: var(--gray-placeholder);
            border-radius: var(--radius);
            padding: 20px 24px;
            text-align: center;
            font-size: 0.88rem;
            color: #b0a89e;
            letter-spacing: 0.04em;
            margin-top: 16px;
            cursor: default;
            user-select: none;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }

        .placeholder-block.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .self-intro {
            margin-top: 52px;
            padding-top: 28px;
            border-top: 1px solid rgba(180, 155, 127, 0.30);
            font-family: var(--font-serif);
            font-size: 0.95rem;
            color: var(--text);
            line-height: 2;
            letter-spacing: 0.03em;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .self-intro.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .self-intro p {
            margin-bottom: 14px;
        }

        .self-intro p:last-child {
            margin-bottom: 0;
        }

        .footer {
            max-width: var(--max-width);
            margin: 36px auto 0;
            padding: 20px 24px 32px;
            border-top: 1px solid rgba(180, 155, 127, 0.30);
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-light);
            letter-spacing: 0.04em;
            line-height: 2;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }

        .footer.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .footer .footer-domain {
            color: var(--accent);
            font-weight: 500;
        }

        .footer .footer-note {
            font-style: italic;
            color: #b0a89e;
        }

        /* ========== 底部导航栏（页脚上方） ========== */
        .bottom-nav {
            max-width: var(--max-width);
            margin: 40px auto 0;
            padding: 18px 24px 4px;
            border-top: 1px solid rgba(180, 155, 127, 0.30);
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }

        .bottom-nav.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .bottom-nav-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 4px 6px;
        }

        .bottom-nav-link {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            font-size: 0.88rem;
            color: var(--text-dark);
            text-decoration: none;
            letter-spacing: 0.05em;
            border-radius: var(--radius-sm);
            transition: color var(--transition-fast), background-color var(--transition-fast);
            position: relative;
        }

        .bottom-nav-link:hover {
            color: var(--primary);
            background-color: var(--hover-bg);
        }

        .bottom-nav-link::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2px;
            background-color: var(--accent);
            border-radius: 1px;
            transition: width var(--transition-fast), left var(--transition-fast);
        }

        .bottom-nav-link:hover::after {
            width: calc(100% - 28px);
            left: 14px;
        }

        .bottom-nav-sep {
            width: 1px;
            height: 16px;
            background-color: rgba(180, 155, 127, 0.35);
            margin: 0 6px;
            flex-shrink: 0;
        }

        .bottom-nav-top {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-left: 8px;
            padding: 6px 16px;
            font-size: 0.88rem;
            font-family: var(--font-sans);
            color: var(--primary);
            background: transparent;
            border: 1px solid rgba(61, 90, 75, 0.35);
            border-radius: 999px;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: background-color var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
        }

        .bottom-nav-top:hover {
            background-color: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        @media (max-width: 600px) {
            .header {
                padding: 36px 16px 16px;
            }
            .header-name {
                font-size: 1.55rem;
            }
            .header-tagline {
                font-size: 0.85rem;
            }
            .avatar-badge {
                width: 56px;
                height: 56px;
                font-size: 26px;
            }
            .avatar-badge::after {
                width: 7px;
                height: 7px;
                bottom: 4px;
                right: 6px;
            }
            .header-github {
                top: 0;
                right: 0;
                width: 34px;
                height: 34px;
            }
            .header-github svg {
                width: 18px;
                height: 18px;
            }
            .weather-widget {
                font-size: 0.82rem;
                padding: 6px 14px;
                margin-top: 12px;
                max-width: 96%;
            }
            .weather-widget .w-icon {
                font-size: 1.15rem;
            }
            .nav-inner {
                justify-content: flex-start;
                padding: 0 16px;
                flex-wrap: nowrap;
            }
            .hamburger-btn {
                display: flex;
            }
            .nav-links {
                display: none;
                position: absolute;
                top: var(--nav-height);
                left: 0;
                right: 0;
                background-color: rgba(250, 247, 242, 0.98);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                flex-direction: column;
                padding: 8px 16px 16px;
                box-shadow: var(--shadow-md);
                border-radius: 0 0 var(--radius) var(--radius);
                z-index: 999;
                gap: 2px;
            }
            .nav-links.open {
                display: flex;
            }
            .nav-item {
                width: 100%;
                justify-content: space-between;
                padding: 12px 16px;
                font-size: 0.95rem;
            }
            .nav-item::after {
                display: none;
            }
            .dropdown-menu {
                position: static;
                transform: none;
                box-shadow: none;
                border-radius: 0;
                background-color: transparent;
                margin-left: 16px;
                border-left: 2px solid rgba(180, 155, 127, 0.25);
                min-width: auto;
                transition: max-height 0.25s ease, opacity 0.25s ease;
            }
            .dropdown-menu.open {
                transform: none;
            }
            .dropdown-menu a {
                padding: 9px 16px;
                font-size: 0.85rem;
            }
            .card-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .card {
                padding: 18px 16px;
            }
            .self-intro {
                font-size: 0.88rem;
                line-height: 1.9;
                padding: 20px 8px 0;
            }
            .section-heading {
                font-size: 1.2rem;
            }
            .main-container {
                padding: 0 16px 32px;
            }
            .footer {
                padding: 16px 16px 28px;
                font-size: 0.76rem;
            }
            .bottom-nav {
                padding: 16px 16px 4px;
                gap: 4px;
            }
            .bottom-nav-sep {
                display: none;
            }
            .bottom-nav-link {
                padding: 6px 12px;
                font-size: 0.82rem;
            }
            .bottom-nav-top {
                margin-left: 0;
                font-size: 0.82rem;
                padding: 6px 14px;
            }
            .back-to-top {
                width: 40px;
                height: 40px;

    <!-- ==================== JavaScript ==================== -->
    <script>
        (function() {

            // ========== 渲染头部 ==========
            function renderHeader() {
                var headerInner = document.querySelector('#header .header-inner');
                if (!headerInner) return;
                headerInner.innerHTML = '';

                var d = siteData.header;

                var avatar = document.createElement('div');
                avatar.className = 'avatar-badge';
                avatar.setAttribute('aria-label', d.englishName + ' 头像徽标');

                h1.className = 'header-name';
                h1.textContent = d.name;
                headerInner.appendChild(h1);

                var pEn = document.createElement('p');
                pEn.className = 'header-english-name';
                pEn.textContent = d.englishName;
                headerInner.appendChild(pEn);

                if (siteData.quotes && siteData.quotes.length > 0) {
                    var pQuote = document.createElement('p');
                    pQuote.className = 'header-quote';
                    var randomIndex = Math.floor(Math.random() * siteData.quotes.length);
                    pQuote.textContent = siteData.quotes[randomIndex];
                    headerInner.appendChild(pQuote);
                }

                var pTag = document.createElement('p');
                pTag.className = 'header-tagline';
                pTag.textContent = d.tagline;
                headerInner.appendChild(pTag);

                var ghLink = document.createElement('a');
                ghLink.href = d.githubUrl;
                ghLink.className = 'header-github';

                ghLink.rel = 'noopener noreferrer';
                ghLink.setAttribute('aria-label', 'GitHub 主页');
                ghLink.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>';
                headerInner.appendChild(ghLink);
            }

            // ========== 渲染导航 ==========
            function renderNavigation() {
                var navLinks = document.getElementById('navLinks');
                var navBar = document.getElementById('navBar');
                if (!navLinks || !navBar) return;

                navLinks.innerHTML = '';

                // 移除旧下拉菜单
                var oldDropdowns = navBar.querySelectorAll('.dropdown-menu');
                oldDropdowns.forEach(function(dd) { dd.remove(); });

                var dropdownIdx = 0;

                siteData.navigation.items.forEach(function(item) {
                    if (item.hasDropdown) {
                        var dropdownId = 'dropdown-' + dropdownIdx;

                        var navItem = document.createElement('span');
                        navItem.className = 'nav-item';
                        navItem.setAttribute('data-has-dropdown', 'true');
                        navItem.setAttribute('data-dropdown', dropdownId);
                        navItem.setAttribute('role', 'button');
                        navItem.setAttribute('tabindex', '0');
                        navItem.setAttribute('aria-expanded', 'false');
                        navItem.innerHTML = item.label + ' <span class="nav-arrow">▼</span>';
                        navLinks.appendChild(navItem);

                        var menu = document.createElement('div');
                        menu.className = 'dropdown-menu';
                        menu.id = dropdownId;
                        menu.setAttribute('aria-label', item.label + '子菜单');
                        item.dropdown.forEach(function(sub) {
                            var a = document.createElement('a');
                            a.href = sub.href;
                            a.textContent = sub.label;
                            menu.appendChild(a);
                        });
                        navBar.appendChild(menu);

                        dropdownIdx++;
                    } else {
                        var navItem = document.createElement('a');
                        navItem.className = 'nav-item';
                        navItem.href = item.href || '/';
                        navItem.setAttribute('data-has-dropdown', 'false');
                        if (item.isActive) {
                            navItem.classList.add('active');
                        }
                        navItem.textContent = item.label;
                        navLinks.appendChild(navItem);
                    }
                });
            }

            // ========== 渲染分类区域 ==========
            function renderSections() {
                var main = document.getElementById('mainContainer');
                if (!main) return;

                siteData.categories.forEach(function(cat) {
                    var section = document.createElement('section');
                    section.className = 'section-block';
                    section.id = 'section-' + cat.id;
                    section.setAttribute('aria-labelledby', 'heading-' + cat.id);

                    var heading = document.createElement('h2');
                    heading.className = 'section-heading';
                    heading.id = 'heading-' + cat.id;
                    heading.textContent = cat.title;
                    section.appendChild(heading);

                    var grid = document.createElement('div');
                    grid.className = 'card-grid';
                    grid.id = 'cardGrid-' + cat.id;
                    section.appendChild(grid);

                    var placeholder = document.createElement('div');
                    placeholder.className = 'placeholder-block';
                    placeholder.setAttribute('data-placeholder', '');
                    placeholder.textContent = cat.placeholder;
                    section.appendChild(placeholder);

                    main.appendChild(section);
                });
            }

            // ========== 渲染单张卡片 ==========
            function renderCard(card) {
                var cardEl = document.createElement(card.link ? 'a' : 'div');
                cardEl.className = 'card';
                cardEl.setAttribute('data-card', '');

                if (card.link) {
                    cardEl.href = card.link;
                }

                if (card.accent) {
                    cardEl.style.borderLeftColor = 'var(--accent)';
                    cardEl.style.cursor = 'default';
                }

                var titleEl = document.createElement('span');
                titleEl.className = 'card-title';
                titleEl.textContent = card.title;
                cardEl.appendChild(titleEl);

                var descEl = document.createElement('span');
                descEl.className = 'card-desc';
                descEl.textContent = card.description;
                cardEl.appendChild(descEl);

                if (card.email || card.phone) {
                    var contactDiv = document.createElement('div');
                    contactDiv.style.cssText = 'margin-top: 8px;';

                    if (card.email) {
                        var emailLink = document.createElement('a');
                        emailLink.href = 'mailto:' + card.email;
                        emailLink.className = 'card-contact-link';
                        emailLink.textContent = '📧 ' + card.email;
                        contactDiv.appendChild(emailLink);
                    }

                    if (card.phone) {
                        var phoneLink = document.createElement('a');
                        phoneLink.href = 'tel:' + card.phone;
                        phoneLink.className = 'card-contact-link';
                        phoneLink.textContent = '📞 ' + card.phone;
                        contactDiv.appendChild(phoneLink);
                    }

                    cardEl.appendChild(contactDiv);
                }

                return cardEl;
            }

            // ========== 渲染所有卡片 ==========
            function renderAllCards() {
                siteData.categories.forEach(function(cat) {
                    var gridEl = document.getElementById('cardGrid-' + cat.id);
                    if (!gridEl) return;
                    gridEl.innerHTML = '';
                    cat.cards.forEach(function(card) {
                        gridEl.appendChild(renderCard(card));
                    });
                });
            }

            // ========== 渲染自我介绍 ==========
            function renderSelfIntro() {
                var main = document.getElementById('mainContainer');
                if (!main) return;

                var section = document.createElement('section');
                section.className = 'self-intro';
                section.id = 'selfIntro';
                section.setAttribute('aria-labelledby', 'heading-intro');

                siteData.about.forEach(function(text) {
                    var p = document.createElement('p');
                    p.textContent = text;
                    section.appendChild(p);
                });

                main.appendChild(section);
            }

            // ========== 渲染底部 ==========
            function renderFooter() {
                var footer = document.getElementById('footer');
                if (!footer) return;
                footer.innerHTML = '';

                var f = siteData.footer;

                var p1 = document.createElement('p');
                p1.innerHTML = f.copyright + ' · <span class="footer-domain">' + f.domain + '</span>';
                footer.appendChild(p1);

                var p2 = document.createElement('p');
                p2.textContent = f.powered;
                footer.appendChild(p2);

                var p3 = document.createElement('p');
                p3.className = 'footer-note';
                p3.textContent = f.note;
                footer.appendChild(p3);

                if (f.lastUpdated) {
                    var p4 = document.createElement('p');
                    p4.style.cssText = 'font-size:0.78rem;color:#b0a89e;margin-top:6px;';
                    p4.textContent = '最后更新：' + f.lastUpdated;
                    footer.appendChild(p4);
                }
            }

            // ========== 更新页面标题 ==========
            function updatePageTitle() {
                var d = siteData.header;
                document.title = d.name + ' · ' + d.englishName + ' | ' + d.tagline;
                var metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) {
                    metaDesc.setAttribute('content',
                        d.name + '（' + d.englishName + '）的个人数字据点——' + d.tagline + '。' + siteData.footer.domain);
                }
            }

            // ========== 执行所有渲染 ==========
            updatePageTitle();
            renderHeader();
            renderNavigation();
            renderSections();
            renderAllCards();
            renderSelfIntro();
            renderFooter();

            // ========== DOM 引用（渲染后获取） ==========
            var navBar = document.getElementById('navBar');
            var hamburgerBtn = document.getElementById('hamburgerBtn');
            var navLinks = document.getElementById('navLinks');
            var allNavItems = navLinks.querySelectorAll('.nav-item[data-has-dropdown="true"]');
            var allDropdowns = document.querySelectorAll('.dropdown-menu');
            var sectionBlocks = document.querySelectorAll('.section-block');
            var selfIntro = document.getElementById('selfIntro');
            var footer = document.getElementById('footer');

            var progressBarFill = document.getElementById('progressBarFill');
            var backToTopBtn = document.getElementById('backToTop');

            var openDropdownId = null;
            var isMobileOpen = false;

            // ========== 滚动：导航栏样式 + 进度条 + 返回顶部 ==========
            function handleScroll() {
                if (window.scrollY > 100) {
                    navBar.classList.add('scrolled');
                } else {
                    navBar.classList.remove('scrolled');
                }

                if (progressBarFill) {
                    var scrollTop = window.scrollY || document.documentElement.scrollTop;
                    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
                    var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                    if (progress > 100) progress = 100;
                    if (progress < 0) progress = 0;
                    progressBarFill.style.width = progress + '%';
                }

                if (backToTopBtn) {
                    if (window.scrollY > 400) {
                        backToTopBtn.classList.add('visible');
                    } else {
                        backToTopBtn.classList.remove('visible');
                    }
                }
            }

            window.addEventListener('scroll', handleScroll, { passive: true });
            handleScroll();

            if (backToTopBtn) {
                backToTopBtn.addEventListener('click', function() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }

            // ========== 下拉菜单逻辑 ==========
            function closeAllDropdowns() {
                allDropdowns.forEach(function(dd) { dd.classList.remove('open'); });
                allNavItems.forEach(function(item) {
                    item.classList.remove('dropdown-open');
                    item.setAttribute('aria-expanded', 'false');
                });
                openDropdownId = null;
            }

            function openDropdown(dropdownId, navItem) {
                closeAllDropdowns();
                var dropdown = document.getElementById(dropdownId);
                if (dropdown) {
                    dropdown.classList.add('open');
                    if (navItem) {
                        navItem.classList.add('dropdown-open');
                        navItem.setAttribute('aria-expanded', 'true');
                    }
                    openDropdownId = dropdownId;
                }
            }

            function toggleDropdown(dropdownId, navItem) {
                if (openDropdownId === dropdownId) {
                    closeAllDropdowns();
                } else {
                    openDropdown(dropdownId, navItem);
                }
            }

            allNavItems.forEach(function(navItem) {
                navItem.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var dropdownId = navItem.getAttribute('data-dropdown');
                    toggleDropdown(dropdownId, navItem);
                });
                navItem.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        var dropdownId = navItem.getAttribute('data-dropdown');
                        toggleDropdown(dropdownId, navItem);
                    }
                });
            });

            document.addEventListener('click', function(e) {
                var inside = e.target.closest('.nav-item') || e.target.closest('.dropdown-menu');
                if (!inside) {
                    closeAllDropdowns();
                }
            });

            allDropdowns.forEach(function(dd) {
                dd.addEventListener('click', function(e) {
                    if (e.target.tagName === 'A') {
                        closeAllDropdowns();
                        if (isMobileOpen) closeMobileNav();
                    }
                });
            });

            // ========== 移动端汉堡菜单 ==========
            function openMobileNav() {
                isMobileOpen = true;
                navLinks.classList.add('open');
                hamburgerBtn.classList.add('open');
                hamburgerBtn.setAttribute('aria-expanded', 'true');
                hamburgerBtn.setAttribute('aria-label', '关闭菜单');
            }

            function closeMobileNav() {
                isMobileOpen = false;
                navLinks.classList.remove('open');
                hamburgerBtn.classList.remove('open');
                hamburgerBtn.setAttribute('aria-expanded', 'false');
                hamburgerBtn.setAttribute('aria-label', '打开菜单');
                closeAllDropdowns();
            }

            function toggleMobileNav() {
                if (isMobileOpen) { closeMobileNav(); } else { openMobileNav(); }
            }

            hamburgerBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleMobileNav();
            });

            document.addEventListener('click', function(e) {
                if (isMobileOpen &&
                    !e.target.closest('#navLinks') &&
                    !e.target.closest('#hamburgerBtn') &&
                    !e.target.closest('.dropdown-menu')) {
                    closeMobileNav();
                }
            });

            window.addEventListener('resize', function() {
                if (window.innerWidth > 600 && isMobileOpen) {
                    closeMobileNav();
                }
            });

            // ========== Intersection Observer：滚动动画 ==========
            var observerOptions = {
                root: null,
                rootMargin: '0px 0px -40px 0px',
                threshold: 0.12
            };

            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        var target = entry.target;

                        if (target.classList.contains('section-block')) {
                            target.classList.add('visible');
                            var cardsInSection = target.querySelectorAll('[data-card]');
                            cardsInSection.forEach(function(card, index) {
                                setTimeout(function() {
                                    card.classList.add('visible');
                                }, index * 80);
                            });
                            var placeholder = target.querySelector('[data-placeholder]');
                            if (placeholder) {
                                setTimeout(function() {
                                    placeholder.classList.add('visible');
                                }, cardsInSection.length * 80 + 50);
                            }
                            observer.unobserve(target);
                        }

                        if (target === selfIntro) {
                            target.classList.add('visible');
                            observer.unobserve(target);
                        }

                        if (target === footer) {
                            target.classList.add('visible');
                            observer.unobserve(target);
                        }
                    }
                });
            }, observerOptions);

            sectionBlocks.forEach(function(section) { observer.observe(section); });
            if (selfIntro) observer.observe(selfIntro);
            if (footer) observer.observe(footer);

            // ========== 页面加载后触发已可见区域 ==========
            function triggerVisibleOnLoad() {
                var allObservables = [].slice.call(sectionBlocks);
                if (selfIntro) allObservables.push(selfIntro);
                if (footer) allObservables.push(footer);

                allObservables.forEach(function(el) {
                    var rect = el.getBoundingClientRect();
                    if (rect.top < window.innerHeight && rect.bottom > 0) {
                        if (el.classList.contains('section-block') && !el.classList.contains('visible')) {
                            el.classList.add('visible');
                            var cardsInSection = el.querySelectorAll('[data-card]');
                            cardsInSection.forEach(function(card, index) {
                                setTimeout(function() {
                                    card.classList.add('visible');
                                }, index * 80);
                            });
                            var placeholder = el.querySelector('[data-placeholder]');
                            if (placeholder) {
                                setTimeout(function() {
                                    placeholder.classList.add('visible');
                                }, cardsInSection.length * 80 + 50);
                            }
                            observer.unobserve(el);
                        }
                        if (el === selfIntro && !el.classList.contains('visible')) {
                            el.classList.add('visible');
                            observer.unobserve(el);
                        }
                        if (el === footer && !el.classList.contains('visible')) {
                            el.classList.add('visible');
                            observer.unobserve(el);
                        }
                    }
                });
            }

            setTimeout(triggerVisibleOnLoad, 800);

            // ========== Escape 关闭 ==========
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeAllDropdowns();
                    if (isMobileOpen) closeMobileNav();
                }
            });

            console.log('📖 hletian.cn — 个人数字据点已就绪');
            console.log('   风格：旧式账簿 / 极简信笺');
            console.log('   黄乐天 · Skyler · 会计学专业');
        })();
    </script>

    <!-- ==================== 天气模块脚本 ==================== -->
    <script>
        (function () {
            var widget = document.getElementById('weatherWidget');
            if (!widget) return;

            // WMO 天气代码 → [中文描述, emoji]
            var WMO = {
                0:  ['晴', '☀️'],
                1:  ['晴间多云', '🌤️'],
                2:  ['多云', '⛅'],
                3:  ['阴', '☁️'],
                45: ['雾', '🌫️'],
                48: ['雾凇', '🌫️'],
                51: ['毛毛雨', '🌦️'],
                53: ['毛毛雨', '🌦️'],
                55: ['毛毛雨', '🌦️'],
                56: ['冻毛毛雨', '🌧️'],
                57: ['冻毛毛雨', '🌧️'],
                61: ['小雨', '🌧️'],
                63: ['中雨', '🌧️'],
                65: ['大雨', '🌧️'],
                66: ['冻雨', '🌧️'],
                67: ['冻雨', '🌧️'],
                71: ['小雪', '🌨️'],
                73: ['中雪', '🌨️'],
                75: ['大雪', '🌨️'],
                77: ['雪粒', '🌨️'],
                80: ['阵雨', '🌦️'],
                81: ['阵雨', '🌦️'],
                82: ['强阵雨', '⛈️'],
                85: ['阵雪', '🌨️'],
                86: ['强阵雪', '🌨️'],
                95: ['雷阵雨', '⛈️'],
                96: ['雷阵雨伴冰雹', '⛈️'],
                99: ['雷阵雨伴冰雹', '⛈️']
            };

            function decodeWMO(code) {
                var m = WMO[code];
                return m ? { text: m[0], emoji: m[1] } : { text: '未知', emoji: '🌡️' };
            }

            function setWeather(city, text, emoji, temp) {
                widget.classList.remove('is-muted');
                widget.innerHTML =
                    '<span class="w-icon">' + emoji + '</span>' +
                    '<span class="w-city">' + city + '</span>' +
                    '<span class="w-sep"></span>' +
                    '<span class="w-cond">' + text + '</span>' +
                    '<span class="w-sep"></span>' +
                    '<span class="w-temp">' + temp + '°C</span>';
            }

            function setMuted(msg) {
                widget.classList.add('is-muted');
                widget.innerHTML = '<span class="w-text">' + msg + '</span>';
            }

            var DEFAULT = { lat: 30.59, lon: 114.30, name: '武汉' };

            function fetchWeather(lat, lon, cityName) {
                var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat +
                    '&longitude=' + lon + '&current=temperature_2m,weather_code&timezone=auto';
                fetch(url)
                    .then(function (r) { if (!r.ok) throw new Error('net'); return r.json(); })
                    .then(function (data) {
                        var cur = data && data.current;
                        if (!cur) throw new Error('empty');
                        var t = cur.temperature_2m;
                        var temp = (t != null && !isNaN(t)) ? Math.round(t) : '--';
                        var w = decodeWMO(cur.weather_code);
                        setWeather(cityName, w.text, w.emoji, temp);
                    })
                    .catch(function () { setMuted('天气暂不可用'); });
            }

            function reverseGeocode(lat, lon, fallbackName) {
                var url = 'https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=' +
                    lat + '&longitude=' + lon + '&localityLanguage=zh';
                fetch(url)
                    .then(function (r) { if (!r.ok) throw new Error('net'); return r.json(); })
                    .then(function (g) {
                        var name = g.city || g.locality || g.principalSubdivision || fallbackName;
                        fetchWeather(lat, lon, name);
                    })
                    .catch(function () { fetchWeather(lat, lon, fallbackName); });
            }

            function loadDefault() {
                fetchWeather(DEFAULT.lat, DEFAULT.lon, DEFAULT.name);
            }

            // 自动获取地理位置；超时 / 拒绝 / 不可用则回退武汉
            if (navigator.geolocation) {
                var done = false;
                var timer = setTimeout(function () {
                    if (!done) { done = true; loadDefault(); }
                }, 8000);
                try {
                    navigator.geolocation.getCurrentPosition(
                        function (pos) {
                            if (done) return;
                            done = true; clearTimeout(timer);
                            var lat = pos.coords.latitude, lon = pos.coords.longitude;
                            reverseGeocode(lat, lon, '我的位置');
                        },
                        function () {
                            if (done) return;
                            done = true; clearTimeout(timer);
                            loadDefault();
                        },
                        { enableHighAccuracy: false, timeout: 8000, maximumAge: 600000 }
                    );
                } catch (e) {
                    if (!done) { done = true; clearTimeout(timer); loadDefault(); }
                }
            } else {
                loadDefault();
            }
        })();
    </script>

    <!-- ==================== 底部导航栏脚本 ==================== -->
    <script>
        (function () {
            var bn = document.getElementById('bottomNav');
            if (bn) bn.classList.add('visible');

            var topBtn = document.getElementById('bottomNavTop');
            if (topBtn) {
                topBtn.addEventListener('click', function () {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }
        })();
    </script>
