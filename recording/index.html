                document.getElementById('recordDate').value = getTodayStr();
                renderFinancePage();
                showToast('记录添加成功！', 'success');
            }

            document.getElementById('btnAddRecord').addEventListener('click', addRecord);

            // 月份筛选
            document.getElementById('filterMonth').value = getCurrentMonth();
            document.getElementById('filterMonth').addEventListener('change', () => {
                renderRecordList();
                renderStats();
                renderChart();
                renderBarChart();
                renderLatteSummary();
                updateBudgetDisplay();
                updateFilterDropdowns();
            });

            // 筛选事件
            document.getElementById('filterAccount').addEventListener('change', renderRecordList);
            document.getElementById('filterCategory').addEventListener('change', renderRecordList);
            document.getElementById('filterKeyword').addEventListener('input', debounce(renderRecordList, 300));
            document.getElementById('btnClearFilter').addEventListener('click', () => {
                document.getElementById('filterAccount').value = '';
                document.getElementById('filterCategory').value = '';
                document.getElementById('filterKeyword').value = '';
                renderRecordList();
            });

            // 添加分类按钮
            document.getElementById('btnAddCategory').addEventListener('click', () => {
                const type = document.getElementById('recordType').value;
                const newCat = prompt(`添加新的${type === 'expense' ? '支出' : '收入'}分类名称：`);
                if (newCat && newCat.trim()) {
                    const trimmed = newCat.trim();
                    const catList = type === 'expense' ? appData.expenseCategories : appData.incomeCategories;
                    if (catList.includes(trimmed)) { showToast('该分类已存在', 'error'); return; }
                    catList.push(trimmed);
                    saveData();
                    updateCategorySelect();
                    document.getElementById('recordCategory').value = trimmed;
                    updateFilterDropdowns();
                    showToast(`分类"${trimmed}"已添加`, 'success');
                }
            });

            // 管理分类按钮
            document.getElementById('btnManageCategories').addEventListener('click', openCategoryManageModal);

            function openCategoryManageModal() {
                const renderCatList = (cats, type, defaultCats) => {
                    return cats.map(c => {
                        const isDefault = defaultCats.includes(c);
                        return `
                        <div class="category-list-item">
                            <span class="cat-name">${escapeHtml(c)}</span>
                            ${isDefault ? '<span class="cat-default">默认</span>' : ''}
                            <div style="display:flex;gap:4px;">
                                <button class="btn btn-outline btn-xs" data-rename-cat="${escapeHtml(c)}" data-type="${type}">✏️</button>
                                ${!isDefault ? `<button class="btn btn-danger btn-xs" data-del-cat="${escapeHtml(c)}" data-type="${type}">🗑️</button>` : ''}
                            </div>
                        </div>`;
                    }).join('');
                };

                const bodyHtml = `
                    <div style="margin-bottom:12px;">
                        <strong>💸 支出分类</strong>
                        <div id="expenseCatList" style="margin-top:6px;">${renderCatList(appData.expenseCategories, 'expense', appData.defaultExpenseCategories)}</div>
                        <div class="form-row" style="margin-top:8px;">
                            <input type="text" class="form-input" id="newExpenseCatInput" placeholder="新支出分类">
                            <button class="btn btn-primary btn-xs" id="btnAddExpenseCat">＋</button>
                        </div>
                    </div>
                    <div style="margin-top:16px;">
                        <strong>💰 收入分类</strong>
                        <div id="incomeCatList" style="margin-top:6px;">${renderCatList(appData.incomeCategories, 'income', appData.defaultIncomeCategories)}</div>
                        <div class="form-row" style="margin-top:8px;">
                            <input type="text" class="form-input" id="newIncomeCatInput" placeholder="新收入分类">
                            <button class="btn btn-primary btn-xs" id="btnAddIncomeCat">＋</button>
                        </div>
                    </div>
                `;

                openModal('⚙️ 管理分类', bodyHtml, '', (overlay, closeModal) => {
                    function rebindButtons() {
                        // 重命名
                        overlay.querySelectorAll('[data-rename-cat]').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const oldName = btn.dataset.renameCat;
                                const type = btn.dataset.type;
                                const newName = prompt(`重命名分类"${oldName}"：`,
                                oldName);
                                if (newName && newName.trim() && newName.trim() !== oldName) {
                                    const trimmed = newName.trim();
                                    const catList = type === 'expense' ? appData
                                        .expenseCategories : appData.incomeCategories;
                                    if (catList.includes(trimmed)) {
                                        showToast('该分类名称已存在', 'error');
                                        return;
                                    }
                                    const idx = catList.indexOf(oldName);
                                    if (idx >= 0) catList[idx] = trimmed;
                                    // 更新记录中的分类
                                    appData.records.forEach(r => {
                                        if (r.category === oldName && ((type ===
                                                'expense' && r.type ===
                                                'expense') || (type === 'income' &&
                                                r.type === 'income'))) {
                                            r.category = trimmed;
                                        }
                                    });
                                    // 更新拿铁规则
                                    if (appData.latteRule && appData.latteRule.categories) {
                                        const ri = appData.latteRule.categories.indexOf(
                                            oldName);
                                        if (ri >= 0) appData.latteRule.categories[ri] =
                                            trimmed;
                                    }
                                    saveData();
                                    updateCategorySelect();
                                    updateFilterDropdowns();
                                    openCategoryManageModal();
                                    closeModal();
                                    showToast(`分类已重命名`, 'success');
                                }
                            });
                        });
                        // 删除
                        overlay.querySelectorAll('[data-del-cat]').forEach(btn => {
                            btn.addEventListener('click', () => {
                                const catName = btn.dataset.delCat;
                                const type = btn.dataset.type;
                                const catList = type === 'expense' ? appData
                                    .expenseCategories : appData.incomeCategories;
                                const defaultCats = type === 'expense' ? appData
                                    .defaultExpenseCategories : appData
                                    .defaultIncomeCategories;
                                if (defaultCats.includes(catName)) {
                                    showToast('默认分类不可删除', 'error');
                                    return;
                                }
                                if (confirm(
                                        `确定要删除分类"${catName}"吗？该分类下的所有记录将归入"其他"。`
                                        )) {
                                    const idx = catList.indexOf(catName);
                                    if (idx >= 0) catList.splice(idx, 1);
                                    if (!catList.includes('其他')) catList.push(
                                    '其他');
                                    appData.records.forEach(r => {
                                        if (r.category === catName && ((
                                                type === 'expense' && r
                                                .type === 'expense') || (
                                                type === 'income' && r.type ===
                                                'income'))) {
                                            r.category = '其他';
                                        }
                                    });
                                    if (appData.latteRule && appData.latteRule
                                        .categories) {
                                        appData.latteRule.categories = appData.latteRule
                                            .categories.filter(c => c !== catName);
                                    }
                                    saveData();
                                    updateCategorySelect();
                                    updateFilterDropdowns();
                                    openCategoryManageModal();
                                    closeModal();
                                    showToast(`分类"${catName}"已删除`, 'success');
                                }
                            });
                        });
                    }

                    rebindButtons();

                    overlay.querySelector('#btnAddExpenseCat').addEventListener('click', () => {
                        const input = overlay.querySelector('#newExpenseCatInput');
                        const name = input.value.trim();
                        if (!name) { showToast('请输入分类名称', 'error'); return; }
                        if (appData.expenseCategories.includes(name)) { showToast('该分类已存在',
                                'error'); return; }
                        appData.expenseCategories.push(name);
                        saveData();
                        input.value = '';
                        updateCategorySelect();
                        updateFilterDropdowns();
                        openCategoryManageModal();
                        closeModal();
                        showToast(`分类"${name}"已添加`, 'success');
                    });
                    overlay.querySelector('#btnAddIncomeCat').addEventListener('click', () => {
                        const input = overlay.querySelector('#newIncomeCatInput');
                        const name = input.value.trim();
                        if (!name) { showToast('请输入分类名称', 'error'); return; }
                        if (appData.incomeCategories.includes(name)) { showToast('该分类已存在',
                                'error'); return; }
                        appData.incomeCategories.push(name);
                        saveData();
                        input.value = '';
                        updateCategorySelect();
                        updateFilterDropdowns();
                        openCategoryManageModal();
                        closeModal();
                        showToast(`分类"${name}"已添加`, 'success');
                    });
                });
            }

            // 拿铁因子规则设置
            document.getElementById('btnLatteRule').addEventListener('click', () => {
                const rule = appData.latteRule || { enabled: false, maxAmount: 30, categories: ['餐饮', '购物',
                        '娱乐'
                    ] };
                const catChips = appData.expenseCategories.map(c => {
                    const selected = rule.categories.includes(c);
                    return `<label class="checkbox-chip ${selected?'selected':''}" data-cat="${escapeHtml(c)}">
                        <input type="checkbox" ${selected?'checked':''}> ${escapeHtml(c)}
                    </label>`;
                }).join('');

                const bodyHtml = `
                    <div class="toggle-row" style="margin-bottom:12px;">
                        <label class="toggle-switch">
                            <input type="checkbox" id="latteRuleEnabled" ${rule.enabled?'checked':''}>
                            <span class="toggle-slider"></span>
                        </label>
                        <label class="toggle-label">启用自动标记规则</label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">💰 金额 ≤ ___ 元时触发</label>
                        <input type="number" class="form-input" id="latteRuleMaxAmount" value="${rule.maxAmount}" min="0" step="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">🏷️ 适用分类（多选）</label>
                        <div class="checkbox-group" id="latteRuleCats">${catChips}</div>
                    </div>
                    <p style="font-size:0.75rem;color:var(--text-muted);margin-top:8px;">💡 添加记录时，金额≤设定值且分类匹配的支出将自动标记为拿铁因子。手动勾选始终有效。</p>
                `;

                openModal('⚙️ 拿铁因子规则设置', bodyHtml, `
                    <button class="btn btn-outline" id="btnCancelLatteRule">取消</button>
                    <button class="btn btn-primary" id="btnSaveLatteRule">💾 保存规则</button>
                `, (overlay, closeModal) => {
                    // 芯片点击切换
                    overlay.querySelectorAll('.checkbox-chip').forEach(chip => {
                        chip.addEventListener('click', () => {
                            const cb = chip.querySelector('input');
                            cb.checked = !cb.checked;
                            chip.classList.toggle('selected', cb.checked);
                        });
                    });

                    overlay.querySelector('#btnCancelLatteRule').addEventListener('click', closeModal);
                    overlay.querySelector('#btnSaveLatteRule').addEventListener('click', () => {
                        const enabled = overlay.querySelector('#latteRuleEnabled').checked;
                        const maxAmount = parseFloat(overlay.querySelector('#latteRuleMaxAmount')
                            .value) || 30;
                        const selectedCats = [];
                        overlay.querySelectorAll('#latteRuleCats .checkbox-chip').forEach(chip => {
                            if (chip.querySelector('input').checked) {
                                selectedCats.push(chip.dataset.cat);
                            }
                        });
                        appData.latteRule = {
                            enabled,
                            maxAmount: Math.max(0, maxAmount),
                            categories: selectedCats.length > 0 ? selectedCats : ['餐饮', '购物',
                                '娱乐'
                            ],
                        };
                        saveData();
                        closeModal();
                        showToast('拿铁因子规则已保存', 'success');
                    });
                });
            });

            // ==================== 打卡模块 ====================
            function renderCheckinPage() {
                renderFixedTasks();
                renderTempTasks();
            }

            function calcStreak(completions) {
                let streak = 0;
                const today = new Date();
                const todayStr = today.toISOString().split('T')[0];
                if (!completions[todayStr]) return 0;
                const d = new Date(today);
                while (true) {
                    const ds = d.toISOString().split('T')[0];
                    if (completions[ds]) { streak++;
                        d.setDate(d.getDate() - 1); } else break;
                }
                return streak;
            }

            function getLastNDays(n) {
                const days = [];
                const today = new Date();
                for (let i = n - 1; i >= 0; i--) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    days.push(d.toISOString().split('T')[0]);
                }
                return days;
            }

            function renderFixedTasks() {
                const container = document.getElementById('fixedTasksContainer');
                const emptyEl = document.getElementById('fixedTasksEmpty');
                const taskNames = Object.keys(appData.fixedTasks);
                const lastN = getLastNDays(currentCalendarDays);
                const todayStr = getTodayStr();

                if (taskNames.length === 0) {
                    container.innerHTML = '';
                    emptyEl.style.display = 'block';
                } else {
                    emptyEl.style.display = 'none';
                    container.innerHTML = taskNames.map(name => {
                        const completions = appData.fixedTasks[name] || {};
                        const streak = calcStreak(completions);
                        const streakCls = streak > 0 ? 'has-streak' : '';
                        const dots = lastN.map(ds => {
                            const done = !!completions[ds];
                            const isToday = ds === todayStr;
                            const cls = ['cal-dot', done ? 'done' : '', isToday ? 'today' : '']
                                .filter(Boolean).join(' ');
                            return `<span class="${cls}" data-task="${escapeHtml(name)}" data-date="${ds}" data-done="${done}">${ds.slice(5)}</span>`;
                        }).join('');
                        return `
                        <div class="fixed-task-row">
                            <span class="fixed-task-name">${escapeHtml(name)}</span>
                            <div class="cal-strip">${dots}</div>
                            <span class="streak-badge ${streakCls}">🔥 ${streak}天连续</span>
                            <button class="btn btn-danger btn-xs" data-del-fixed="${escapeHtml(name)}">删除</button>
                        </div>`;
                    }).join('');

                    // 展开/收起按钮
                    container.innerHTML += `
                    <div style="text-align:center;margin-top:8px;">
                        <button class="btn btn-outline btn-xs" id="btnToggleCalendar">
                            ${currentCalendarDays === 7 ? '📅 展开到14天' : currentCalendarDays === 14 ? '📅 展开到30天' : '📅 收起到7天'}
                        </button>
                    </div>`;

                    container.querySelector('#btnToggleCalendar').addEventListener('click', () => {
                        if (currentCalendarDays === 7) currentCalendarDays = 14;
                        else if (currentCalendarDays === 14) currentCalendarDays = 30;
                        else currentCalendarDays = 7;
                        renderFixedTasks();
                    });

                    container.querySelectorAll('.cal-dot.today').forEach(dot => {
                        dot.addEventListener('click', () => {
                            const taskName = dot.dataset.task;
                            const dateStr = dot.dataset.date;
                            const currentDone = dot.dataset.done === 'true';
                            if (!appData.fixedTasks[taskName]) appData.fixedTasks[
                                taskName] = {};
                            if (currentDone) {
                                delete appData.fixedTasks[taskName][dateStr];
                            } else {
                                appData.fixedTasks[taskName][dateStr] = true;
                            }
                            saveData();
                            renderFixedTasks();
                        });
                    });

                    container.querySelectorAll('[data-del-fixed]').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const taskName = btn.dataset.delFixed;
                            if (confirm(`确定要删除固定任务"${taskName}"吗？`)) {
                                delete appData.fixedTasks[taskName];
                                saveData();
                                renderFixedTasks();
                                showToast(`任务"${taskName}"已删除`, 'success');
                            }
                        });
                    });
                }
            }

            function renderTempTasks() {
                const container = document.getElementById('tempTasksContainer');
                const emptyEl = document.getElementById('tempTasksEmpty');
                const todayStr = getTodayStr();
                const tasks = appData.tempTasks || [];
                if (tasks.length === 0) {
                    container.innerHTML = '';
                    emptyEl.style.display = 'block';
                } else {
                    emptyEl.style.display = 'none';
                    const sorted = [...tasks].sort((a, b) => {
                        if (a.completed !== b.completed) return a.completed ? 1 : -1;
                        if (!a.completed && a.deadline < todayStr && b.deadline >= todayStr)
                            return -1;
                        if (!b.completed && b.deadline < todayStr && a.deadline >= todayStr)
                            return 1;
                        return a.deadline.localeCompare(b.deadline);
                    });
                    container.innerHTML = sorted.map(t => {
                        const completed = !!t.completed;
                        const overdue = !completed && t.deadline < todayStr;
                        const cls = ['temp-task-item', completed ? 'completed' : '', overdue ?
                            'overdue' : ''
                        ].filter(Boolean).join(' ');
                        const daysLeft = Math.ceil((new Date(t.deadline) - new Date(todayStr)) / (
                            1000 * 60 * 60 * 24));
                        let deadlineText = t.deadline;
                        let urgencyCls = '';
                        if (!completed) {
                            if (daysLeft < 0) {
                                deadlineText += ` (已逾期${Math.abs(daysLeft)}天)`;
                                urgencyCls = 'urgent';
                            } else if (daysLeft === 0) {
                                deadlineText += ' (今天截止)';
                                urgencyCls = 'urgent';
                            } else if (daysLeft <= 3) {
                                deadlineText += ` (剩余${daysLeft}天)`;
                                urgencyCls = 'urgent';
                            } else {
                                deadlineText += ` (剩余${daysLeft}天)`;
                            }
                        }
                        return `
                        <div class="${cls}">
                            <input type="checkbox" class="checkbox-custom" data-toggle-temp="${t.id}" ${completed ? 'checked' : ''}>
                            <span class="temp-task-name">${escapeHtml(t.name)}</span>
                            <span class="temp-task-deadline ${urgencyCls}">📅 ${deadlineText}</span>
                            <button class="btn btn-danger btn-xs" data-del-temp="${t.id}">删除</button>
                        </div>`;
                    }).join('');

                    container.querySelectorAll('[data-toggle-temp]').forEach(cb => {
                        cb.addEventListener('change', () => {
                            const tid = cb.dataset.toggleTemp;
                            const task = appData.tempTasks.find(t => t.id === tid);
                            if (task) { task.completed = cb.checked;
                                saveData();
                                renderTempTasks(); }
                        });
                    });
                    container.querySelectorAll('[data-del-temp]').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const tid = btn.dataset.delTemp;
                            if (confirm('确定要删除这个临时任务吗？')) {
                                appData.tempTasks = appData.tempTasks.filter(t => t.id !==
                                    tid);
                                saveData();
                                renderTempTasks();
                                showToast('任务已删除', 'success');
                            }
                        });
                    });
                }
            }

            document.getElementById('btnAddFixedTask').addEventListener('click', () => {
                const input = document.getElementById('newFixedTaskName');
                const name = input.value.trim();
                if (!name) { showToast('请输入任务名称', 'error'); return; }
                if (appData.fixedTasks[name]) { showToast('该任务已存在', 'error'); return; }
                appData.fixedTasks[name] = {};
                saveData();
                input.value = '';
                renderFixedTasks();
                showToast(`固定任务"${name}"已添加`, 'success');
            });

            document.getElementById('btnAddTempTask').addEventListener('click', () => {
                const nameInput = document.getElementById('newTempTaskName');
                const deadlineInput = document.getElementById('newTempTaskDeadline');
                const name = nameInput.value.trim();
                const deadline = deadlineInput.value;
                if (!name) { showToast('请输入任务名称', 'error'); return; }
                if (!deadline) { showToast('请选择截止日期', 'error'); return; }
                const task = { id: genId(), name, deadline, completed: false, createdAt: Date.now() };
                if (!appData.tempTasks) appData.tempTasks = [];
                appData.tempTasks.push(task);
                saveData();
                nameInput.value = '';
                deadlineInput.value = '';
                renderTempTasks();
                showToast('临时任务已添加', 'success');
            });

            // ==================== 导出/导入 ====================
            document.getElementById('btnExport').addEventListener('click', () => {
                const jsonStr = JSON.stringify(appData, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `记账打卡_备份_${getTodayStr()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('数据导出成功！', 'success');
            });

            document.getElementById('btnImport').addEventListener('click', () => {
                document.getElementById('importFileInput').click();
            });

            document.getElementById('importFileInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (!imported || typeof imported !== 'object') throw new Error('无效的数据格式');
                        const defaults = getDefaultData();
                        appData = deepMerge(defaults, imported);
                        if (Array.isArray(appData.accounts)) {
                            const accObj = {};
                            appData.accounts.forEach(a => {
                                if (typeof a === 'string') accObj[a] = { initialBalance: 0 };
                                else if (a && a.name) accObj[a.name] = { initialBalance: a
                                        .initialBalance || 0 };
                            });
                            appData.accounts = accObj;
                        }
                        if (!appData.records) appData.records = [];
                        if (!appData.tempTasks) appData.tempTasks = [];
                        if (!appData.latteRule) appData.latteRule = getDefaultData().latteRule;
                        if (!appData.defaultExpenseCategories) appData.defaultExpenseCategories =
                            getDefaultData().defaultExpenseCategories;
                        if (!appData.defaultIncomeCategories) appData.defaultIncomeCategories =
                            getDefaultData().defaultIncomeCategories;
                        saveData();
                        switchTab('finance');
                        document.getElementById('filterMonth').value = getCurrentMonth();
                        renderFinancePage();
                        showToast('数据导入成功！', 'success');
                    } catch (err) {
                        showToast('导入失败：文件格式不正确', 'error');
                        console.error('导入失败', err);
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            });

            // ==================== 键盘快捷键 ====================
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    const activeTab = document.getElementById('tabFinance').style.display !== 'none' ?
                        'finance' : 'checkin';
                    if (activeTab === 'finance') addRecord();
                }
            });

            // ==================== PWA ====================
            function setupPWA() {
                // Manifest
                const manifest = {
                    name: '记账 & 日常打卡',
                    short_name: '记账打卡',
                    description: '个人记账与日常打卡工具',
                    start_url: '.',
                    display: 'standalone',
                    background_color: '#f5f6f8',
                    theme_color: '#5b6af0',
                    icons: [{
                        src: 'data:image/svg+xml,' + encodeURIComponent(
                            '<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192"><rect width="192" height="192" rx="32" fill="#5b6af0"/><text x="96" y="120" font-size="100" text-anchor="middle" fill="white">📒</text></svg>'
                            ),
                        sizes: '192x192',
                        type: 'image/svg+xml'
                    }],
                };
                const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
                const manifestUrl = URL.createObjectURL(manifestBlob);
                const link = document.createElement('link');
                link.rel = 'manifest';
                link.href = manifestUrl;
                document.head.appendChild(link);

                // Service Worker
                if ('serviceWorker' in navigator) {
                    const swCode = `
                        const CACHE_NAME = 'finance-tracker-v2';
                        const ASSETS = [
                            self.location.href,
                            'https://cdn.jsdelivr.net/npm/chart.js',
                        ];
                        self.addEventListener('install', (e) => {
                            e.waitUntil(
                                caches.open(CACHE_NAME).then((cache) => {
                                    return Promise.allSettled(ASSETS.map(url => cache.add(url).catch(() => {})));
                                })
                            );
                            self.skipWaiting();
                        });
                        self.addEventListener('activate', (e) => {
                            e.waitUntil(
                                caches.keys().then(keys => Promise.all(
                                    keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))
                                ))
                            );
                            self.clients.claim();
                        });
                        self.addEventListener('fetch', (e) => {
                            if (e.request.method !== 'GET') return;
                            e.respondWith(
                                caches.match(e.request).then((cached) => {
                                    const fetched = fetch(e.request).then((response) => {
                                        if (response && response.status === 200) {
                                            const clone = response.clone();
                                            caches.open(CACHE_NAME).then(cache => cache.put(e.request, clone));
                                        }
                                        return response;
                                    }).catch(() => cached);
                                    return cached || fetched;
                                })
                            );
                        });
                    `;
                    const swBlob = new Blob([swCode], { type: 'application/javascript' });
                    const swUrl = URL.createObjectURL(swBlob);
                    navigator.serviceWorker.register(swUrl).then(() => {
                        console.log('✅ Service Worker 已注册');
                    }).catch((err) => {
                        console.warn('⚠️ Service Worker 注册失败（可能需要 HTTPS）:', err.message);
                    });
                }
            }

            // ==================== 初始化 ====================
            function init() {
                const defaults = getDefaultData();
                appData = deepMerge(defaults, appData);
                if (Array.isArray(appData.accounts)) {
                    const accObj = {};
                    appData.accounts.forEach(a => {
                        if (typeof a === 'string') accObj[a] = { initialBalance: 0 };
                        else if (a && a.name) accObj[a.name] = { initialBalance: a.initialBalance || 0 };
                    });
                    appData.accounts = accObj;
                }
                if (!appData.latteRule) appData.latteRule = getDefaultData().latteRule;
                if (!appData.defaultExpenseCategories) appData.defaultExpenseCategories = getDefaultData()
                    .defaultExpenseCategories;
                if (!appData.defaultIncomeCategories) appData.defaultIncomeCategories = getDefaultData()
                    .defaultIncomeCategories;
                saveData();

                document.getElementById('filterMonth').value = getCurrentMonth();
                document.getElementById('recordDate').value = getTodayStr();
                document.getElementById('newTempTaskDeadline').value = getTodayStr();

                switchTab('finance');

                // 设置金额输入框的事件监听（用于拿铁因子自动判断）
                const amountInput = document.getElementById('recordAmount');
                if (amountInput) {
                    amountInput.addEventListener('input', () => {
                        if (document.getElementById('recordType').value === 'expense') {
                            autoCheckLatteRule();
                        }
                    });
                }

                setupPWA();
                console.log('✅ 记账+打卡应用已就绪');
                console.log('   💡 提示：Ctrl+Enter 可快速提交记账记录');
                console.log('   📊 数据存储在 localStorage，使用导出功能定期备份');
                console.log('   📱 PWA 模式已启用，支持离线使用');
            }

            init();
        })();
    </script>
</body>
</html>
