<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>/now/</title>
    <style>
        :root {
            --bg: #fcf8f2;
            /* 米白纸色 */
            --ink: #2b4a3f;
            /* 墨绿主文字 */
            --gold: #c29b5a;
            /* 古铜金点缀 */
            --ink-light: #7f9a94;
            /* 墨绿浅色 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Serif SC", serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
            line-height: 1.6;
        }

        .page {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 1.8rem;
        }

        /* 返回首页链接 */
        .back-home {
            align-self: flex-start;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease, color 0.2s ease;
        }

        .back-home:hover,
        .back-home:focus {
            border-bottom-color: var(--gold);
            color: var(--ink);
        }

        /* 主体内容 */
        .now-content {
            width: 100%;
            padding: 0.5rem 0 0 0;
        }

        .status-line {
            font-size: 1.2rem;
            letter-spacing: 0.02em;
            color: var(--ink);
            line-height: 2;
            margin: 0;
        }

        .status-line .sep {
            color: var(--gold);
            margin: 0 0.4em;
            font-weight: 300;
        }

        .update-meta {
            margin-top: 2.2rem;
            font-size: 0.8rem;
            color: var(--ink-light);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="page">
        <a href="/" class="back-home">← 返回首页</a>

        <div class="now-content">
            <!-- 👇 直接修改下面这行即可 -->
            <p class="status-line">
                正在做：个人网页制作<span class="sep">｜</span>减脂中<span class="sep">｜</span>更新中
            </p>
            <!-- 👆 状态行结束 -->

            <p class="update-meta">最后更新：2026-07-21</p>
        </div>
    </div>
</body>
</html>
